global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: app-server
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: /metrics

  - job_name: directory
    static_configs:
      - targets: ["host.docker.internal:8081"]
    metrics_path: /metrics
