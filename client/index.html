<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>hey</title>

</head>

<body>
    <div id="main-container">
        <div id="popup-overlay">
            <div id="popup">
                <h2>pick the username</h2>
                <label for="usernameInput">username:</label><br />
                <input type="text" id="username-input" />
                <br /><br />
                <button onclick="signIn()">let me in</button>
            </div>
        </div>
        <div id="chat-container">
            <div class="chat-header">
                <div class="chat-title">
                    <span class="chat-icon"></span>
                    <span class="chat-name">chat</span>
                </div>
                <div class="window-controls">
                    <button class="minimize" onclick="minimizeCLI()"></button>
                    <button class="fullscreen" onclick="fullscreenCLI()""></button>
                <button class=" close" onclick="closeCLI()"></button>
                </div>
            </div>
            <div id="messages"></div>
            <div id="message-controls">
                <div id="formatting-controls">
                    <!-- <button class="format-btn" data-action="bold"><b>B</b></button>
                    <button class="format-btn" data-action="italic"><i>I</i></button>
                    <button class="format-btn" data-action="underline"><u>U</u></button>
                    <button class="format-btn" data-action="line-through"><s>S</s></button> -->
                    <!-- <input type="color" id="text-color-picker" title="Choose text color" /> -->
                </div>
                <form action="" id="submit">
                    <!-- <div id="message" contenteditable="true" placeholder="message"></div> -->
                    <input placeholder="message" type="text" id="message">
                    <input type="submit" value="send" id="send-message">
                </form>
            </div>
        </div>
    </div>
    <script src="chat.js"></script>
</body>

</html>
